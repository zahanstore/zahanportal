<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Zahan Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent-color: #0096FF; --background-color: #D9D9D9; --white: #fff; }
        body { font-family: 'Quicksand', sans-serif; background: var(--background-color); margin: 0; }
        .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 120px 20px; }
        
        .product-flex { display: flex; flex-wrap: wrap; gap: 50px; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .product-image { flex: 1; min-width: 300px; }
        .product-image img { width: 100%; border-radius: 10px; }
        .product-info { flex: 1; min-width: 300px; }
        
        .price { font-size: 2rem; color: var(--accent-color); font-weight: 700; margin: 20px 0; }
        .buy-btn { background: var(--accent-color); color: white; border: none; padding: 15px 40px; border-radius: 5px; cursor: pointer; font-size: 1.1rem; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="product-flex">
            <div class="product-image">
                <img id="p-img" src="" alt="">
            </div>
            <div class="product-info">
                <h1 id="p-title">Loading...</h1>
                <p id="p-cat" style="text-transform: uppercase; color: #777;"></p>
                <div class="price" id="p-price"></div>
                <p id="p-desc">High quality product from Zahan Store. Durable and stylish for everyday use.</p>
                <button class="buy-btn" onclick="addToCartDetailed()">Add to Cart</button>
                <br><br>
                <a href="products.html" style="color: #777;">← Back to Catalogue</a>
            </div>
        </div>
    </div>

    <script>
        // Fake Database - Replace with real values or an API later
        const products = {
            "classic-white-tee": { name: "Classic White Tee", price: 29.99, cat: "Apparel", img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800" },
            "black-oversized-tee": { name: "Black Oversized Tee", price: 34.99, cat: "Apparel", img: "https://images.unsplash.com/photo-1503341504253-dff4815485f1?w=800" }
        };

        const params = new URLSearchParams(window.location.search);
        const slug = params.get('product');
        const item = products[slug];

        if(item) {
            document.getElementById('p-title').innerText = item.name;
            document.getElementById('p-price').innerText = "₹" + item.price;
            document.getElementById('p-cat').innerText = item.cat;
            document.getElementById('p-img').src = item.img;
        }

        function addToCartDetailed() {
            let cart = JSON.parse(localStorage.getItem('zahanCart')) || [];
            cart.push({ name: item.name, price: item.price, image: item.img, quantity: 1 });
            localStorage.setItem('zahanCart', JSON.stringify(cart));
            alert("Added to cart!");
            window.location.href = "cart.html";
        }
    </script>
</body>
</html>
