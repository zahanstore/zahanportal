<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 500px; margin: 0 auto; }
    input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { background: #5b8dee; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    #status { margin-top: 1rem; padding: 1rem; border-radius: 6px; display: none; }
    .ok  { background: #d1fae5; color: #065f46; }
    .err { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>

  <h2>🧪 Supabase Connection Test</h2>
  <p id="sdk-check">Checking SDK...</p>

  <input id="t-name"    type="text"  placeholder="Your name" value="Test User">
  <input id="t-email"   type="email" placeholder="Email"     value="test@test.com">
  <input id="t-subject" type="text"  placeholder="Subject"   value="Test message">
  <textarea id="t-msg"  rows="3">This is a test submission</textarea>

  <button onclick="runTest()">Send Test to Supabase</button>

  <div id="status"></div>
  <pre id="log" style="margin-top:1rem;font-size:0.8rem;background:#f3f4f6;padding:1rem;border-radius:6px;overflow:auto;"></pre>

  <script>
    const SUPABASE_URL  = '%%SUPABASE_URL%%';
    const SUPABASE_ANON = '%%SUPABASE_ANON%%';

    const log = (msg) => {
      document.getElementById('log').textContent += msg + '\n';
      console.log(msg);
    };

    // Check SDK loaded
    window.addEventListener('load', () => {
      if (typeof window.supabase !== 'undefined') {
        document.getElementById('sdk-check').innerHTML = '✅ Supabase SDK loaded';
        document.getElementById('sdk-check').style.color = 'green';
      } else {
        document.getElementById('sdk-check').innerHTML = '❌ Supabase SDK NOT loaded';
        document.getElementById('sdk-check').style.color = 'red';
      }
      log('URL: ' + SUPABASE_URL);
      log('Key starts with: ' + SUPABASE_ANON.substring(0, 20) + '...');
    });

    async function runTest() {
      const status = document.getElementById('status');
      status.style.display = 'block';
      status.className = '';
      status.textContent = '⏳ Sending...';
      log('--- New test ---');

      try {
        const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        log('Client created ✅');

        const payload = {
          name:       document.getElementById('t-name').value,
          email:      document.getElementById('t-email').value,
          department: 'support',
          routed_to:  'support@mail.zahan.one',
          subject:    document.getElementById('t-subject').value,
          message:    document.getElementById('t-msg').value,
          created_at: new Date().toISOString()
        };
        log('Payload: ' + JSON.stringify(payload));

        const { data, error } = await client
          .from('contact_messages')
          .insert([payload])
          .select();

        if (error) {
          log('❌ ERROR: ' + JSON.stringify(error));
          status.className = 'err';
          status.textContent = '❌ Error: ' + error.message + ' (code: ' + error.code + ')';
        } else {
          log('✅ SUCCESS: ' + JSON.stringify(data));
          status.className = 'ok';
          status.textContent = '✅ Row saved! Check Supabase now.';
        }

      } catch (e) {
        log('💥 Exception: ' + e.message);
        status.className = 'err';
        status.textContent = '💥 Exception: ' + e.message;
      }
    }
  </script>

</body>
</html>
