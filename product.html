<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Zahan Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0096FF; --bg: #D9D9D9; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding: 120px 0; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: white; padding: 40px; border-radius: 20px; max-width: 1000px; margin: 0 auto; }
        .img-box img { width: 100%; border-radius: 10px; }
        .add-btn { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; }
        @media (max-width: 768px) { .product-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="product-grid">
        <div class="img-box"><img id="main-img" src=""></div>
        <div class="content-box">
            <h1 id="title">Loading...</h1>
            <h2 id="price" style="color: var(--accent);"></h2>
            <p id="desc">Experience premium quality with Zahan Store's curated collection.</p>
            <button class="add-btn" onclick="addToCartFromDetail()">Add to Cart</button>
        </div>
    </div>

    <script>
        const products = {
            "classic-white-tee": { name: "Classic White Tee", price: 29.99, img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800" },
            "black-oversized-tee": { name: "Black Oversized Tee", price: 34.99, img: "https://images.unsplash.com/photo-1503341504253-dff4815485f1?w=800" }
        };

        const slug = new URLSearchParams(window.location.search).get('product');
        const p = products[slug];

        if(p) {
            document.getElementById('title').innerText = p.name;
            document.getElementById('price').innerText = "₹" + p.price;
            document.getElementById('main-img').src = p.img;
        }

        function addToCartFromDetail() {
            let cart = JSON.parse(localStorage.getItem('zahanCart')) || [];
            cart.push({ ...p, quantity: 1, image: p.img });
            localStorage.setItem('zahanCart', JSON.stringify(cart));
            window.location.href = "cart.html";
        }
    </script>
</body>
</html>
