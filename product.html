<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Zahan Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0096FF; --bg: #D9D9D9; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding-top: 120px; }
        .container { width: 90%; max-width: 1000px; margin: 0 auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .product-flex { display: flex; gap: 50px; flex-wrap: wrap; }
        .product-flex > div { flex: 1; min-width: 300px; }
        img { width: 100%; border-radius: 12px; }
        .price { font-size: 2.5rem; color: var(--accent); font-weight: 700; margin: 20px 0; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 20px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="product-flex">
            <div><img id="main-img" src="" alt="Loading..."></div>
            <div>
                <h1 id="title">Loading Product...</h1>
                <p id="cat" style="text-transform: uppercase; color: #888;"></p>
                <div class="price" id="price"></div>
                <p style="line-height: 1.8; color: #555;">This is a high-quality product from our Qikink Sandbox collection. Crafted for comfort and printed with precision.</p>
                <br>
                <button class="btn-add" onclick="addCurrentToCart()">Add to Shopping Cart</button>
                <br><br>
                <a href="products.html" style="text-decoration: none; color: #666;">← Back to Collection</a>
            </div>
        </div>
    </div>

    <script>
        let currentP = null;
        const id = new URLSearchParams(window.location.search).get('id');

        async function loadDetail() {
            const res = await fetch('/api/qikink-products'); // In sandbox, we fetch all and find by ID
            const products = await res.json();
            currentP = products.find(p => p.id == id);

            if(currentP) {
                document.getElementById('title').innerText = currentP.name;
                document.getElementById('price').innerText = "₹" + currentP.price;
                document.getElementById('main-img').src = currentP.image_url;
                document.getElementById('cat').innerText = currentP.category;
            }
        }

        function addCurrentToCart() {
            let cart = JSON.parse(localStorage.getItem('zahanCart')) || [];
            cart.push({ name: currentP.name, price: currentP.price, image: currentP.image_url, quantity: 1 });
            localStorage.setItem('zahanCart', JSON.stringify(cart));
            window.location.href = "cart.html";
        }

        loadDetail();
    </script>
</body>
</html>
