<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Success - Zahan Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #D9D9D9; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card { background: white; padding: 50px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; }
        .success-icon { font-size: 80px; color: #4BB543; margin-bottom: 20px; }
        .btn { display: inline-block; margin-top: 25px; padding: 12px 25px; background: #0096FF; color: white; text-decoration: none; border-radius: 5px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon">✓</div>
        <h1>Thank You!</h1>
        <p>Your payment was successful and your order has been placed.</p>
        <a href="products.html" class="btn">Back to Store</a>
    </div>

    <script>
        // CRITICAL: Clear the cart so the user doesn't pay twice
        localStorage.removeItem('zahanCart');
    </script>
</body>
</html>
