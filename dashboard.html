<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Account - Zahan Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #D9D9D9; padding: 50px 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; }
        .order-item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; }
        .status { color: #4BB543; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Order History</h1>
        <div id="orders">No orders found.</div>
        <br><a href="products.html">← Back to Shop</a>
    </div>
    <script>
        const history = JSON.parse(localStorage.getItem('orderHistory')) || [];
        if(history.length > 0) {
            document.getElementById('orders').innerHTML = history.map(o => `
                <div class="order-item">
                    <div>Order ID: ${o.id}<br><small>${o.date}</small></div>
                    <div style="text-align:right">₹${o.amount}<br><span class="status">Success</span></div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
