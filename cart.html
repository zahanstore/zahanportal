<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Zahan Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --accent: #0096FF; --bg: #D9D9D9; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); margin: 0; padding-top: 100px; }
        .container { width: 90%; max-width: 1000px; margin: 0 auto; }
        .cart-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .cart-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding: 15px 0; }
        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
        .checkout-btn { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 1.1rem; }
        .qty-ctrl { display: flex; align-items: center; gap: 10px; }
        .qty-btn { background: #eee; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="cart-card">
            <h1>Your Cart</h1>
            <div id="cart-list"></div>
            <div id="cart-total-area" style="text-align: right; margin-top: 20px; display: none;">
                <h3>Total: ₹<span id="grand-total">0</span></h3>
                <button class="checkout-btn" onclick="securePay()">Secure Checkout</button>
            </div>
            <br>
            <a href="products.html" style="text-decoration: none; color: var(--accent);">← Continue Shopping</a>
        </div>
    </div>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('zahanCart')) || [];
            const list = document.getElementById('cart-list');
            const totalArea = document.getElementById('cart-total-area');
            
            if(cart.length === 0) {
                list.innerHTML = "Your cart is empty. <a href='products.html'>Shop now</a>";
                totalArea.style.display = "none";
                return;
            }

            totalArea.style.display = "block";
            let total = 0;
            list.innerHTML = cart.map((item, i) => {
                total += item.price * item.quantity;
                return `
                    <div class="cart-item">
                        <img src="${item.image}">
                        <div style="flex:1; margin-left: 20px;">
                            <h4>${item.name}</h4>
                            <p>₹${item.price}</p>
                        </div>
                        <div class="qty-ctrl">
                            <button class="qty-btn" onclick="changeQty(${i}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('grand-total').innerText = total.toFixed(2);
        }

        function changeQty(index, delta) {
            let cart = JSON.parse(localStorage.getItem('zahanCart'));
            cart[index].quantity += delta;
            if(cart[index].quantity < 1) cart.splice(index, 1);
            localStorage.setItem('zahanCart', JSON.stringify(cart));
            loadCart();
        }

        async function securePay() {
    const cart = JSON.parse(localStorage.getItem('zahanCart'));
    if (!cart || cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }

    const totalAmount = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
    const checkoutBtn = document.querySelector('.checkout-btn');
    
    // UI Feedback: Disable button while loading
    checkoutBtn.innerText = "Processing...";
    checkoutBtn.disabled = true;

    try {
        const res = await fetch('/api/create-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ amount: totalAmount })
        });

        if (!res.ok) throw new Error("Could not create Razorpay Order");

        const order = await res.json();

        const options = {
            "key": "rzp_live_SAq711xB58uR33", 
            "amount": order.amount,
            "currency": "INR",
            "name": "Zahan Store",
            "description": "Purchase from Zahan Store",
            "order_id": order.id,
            "handler": function (response) {
                // Success Logic
                const orderData = {
                    id: response.razorpay_payment_id,
                    date: new Date().toLocaleString(),
                    amount: totalAmount.toFixed(2),
                    items: cart.length
                };
                
                let history = JSON.parse(localStorage.getItem('orderHistory')) || [];
                history.push(orderData);
                localStorage.setItem('orderHistory', JSON.stringify(history));
                
                localStorage.removeItem('zahanCart');
                window.location.href = "success.html";
            },
            "prefill": {
                "name": "Customer Name",
                "email": "customer@example.com"
            },
            "theme": { "color": "#0096FF" }
        };

        const rzp = new Razorpay(options);
        rzp.open();

    } catch (err) {
        alert("Payment Error: " + err.message);
        console.error(err);
    } finally {
        checkoutBtn.innerText = "Secure Checkout";
        checkoutBtn.disabled = false;
    }
        
                // Fetch Order from your backend
                const res = await fetch('/api/create-order', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: totalAmount }) 
                });
                const order = await res.json();

                const options = {
                    "key": "rzp_live_SAq711xB58uR33", 
                    "amount": order.amount,
                    "currency": "INR",
                    "name": "Zahan Store",
                    "order_id": order.id,
                    "handler": function (response) {
                        // 1. SAVE TO DASHBOARD HISTORY
                        const orderData = {
                            id: response.razorpay_payment_id,
                            date: new Date().toLocaleString(),
                            amount: totalAmount.toFixed(2)
                        };
                        let history = JSON.parse(localStorage.getItem('orderHistory')) || [];
                        history.push(orderData);
                        localStorage.setItem('orderHistory', JSON.stringify(history));

                        // 2. CLEAR CART
                        localStorage.removeItem('zahanCart');

                        // 3. REDIRECT TO SUCCESS PAGE
                        window.location.href = "success.html";
                    },
                    "theme": { "color": "#0096FF" }
                };
                const rzp = new Razorpay(options);
                rzp.open();
            } catch (err) {
                alert("Payment failed to initialize. Please try again.");
                console.error(err);
            }
        }
        loadCart();
    </script>
</body>
</html>
